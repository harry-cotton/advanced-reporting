name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (reads .python-version, installs pinned Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment from lockfile
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Generate synthetic data (known ground-truth DGP)
        run: uv run python scripts/generate_sample_data.py

      - name: Ingest to durable store
        run: uv run python scripts/ingest.py --source synthetic

      - name: Run pipeline end-to-end (includes ground-truth recovery gate)
        run: uv run python scripts/run_pipeline.py

      - name: Tests
        run: uv run pytest -q
