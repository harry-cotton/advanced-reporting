# Copy to config/config.yaml (gitignored) and adjust to your data.
project:
  name: Advanced Reporting
  currency: USD

data:
  # optional: restrict the pipeline to specific extraction sources (see the `source`
  # column stamped by the store), e.g. [google_ads, meta_ads, linkedin_ads, ga4].
  # null = use everything in the store. CLI --sources overrides.
  sources: null
  source: synthetic          # active ad source: synthetic | csv | supermetrics |
                             #   google_ads | meta | tiktok | linkedin (see ingestion/factory.py)
  geos:                      # synthetic-only: a handful of geos to emit
    - US-NE
    - US-MW
    - US-W
  start: "2024-07-01"        # fixed extraction window (ISO) for deterministic, reproducible
  end: "2026-06-28"          #   pulls; override per-run with `ingest.py --start/--end`
  raw_dir: data/raw
  processed_dir: data/processed
  sample_file: data/raw/sample_campaigns.csv

modeling:
  engine: baseline            # "baseline" (always available) or "meridian"
  target: revenue             # KPI to decompose
  date_col: date
  channel_spend_cols:         # media channels (spend) to model
    - google_search
    - google_pmax
    - meta
    - tiktok
    - linkedin
  control_cols:               # non-media drivers
    - price_index
    - promo_flag
  adstock_max_lag: 8
  train_frac: 0.85

quality:
  spike_factor: 3.0           # flag a week if channel x geo spend > N x the prior week
  fill_freq: W-MON            # calendar grain for gap-filling missing weeks

agent:
  # The report-spec agent (scripts/advise.py --spec). Runs at PIPELINE TIME only —
  # sends system/ knowledge + compact computed summaries (never raw rows) to the
  # model API. Set enabled: false for engagements whose confidentiality terms
  # forbid third-party processing (see system/context/client_brief.template.md).
  enabled: true
  model: claude-sonnet-5

reporting:
  output_dir: outputs
  # Label for the analytics-measured outcome (GA4 key events) in dashboard prose,
  # e.g. "start applications" for the MBA scenario. Default: "key events".
  # Leave unset to let the report-spec agent fill it (an explicit value here wins).
  # kpi_label: key events
  # Optional spend plan for the Overview pacing block. Leave null to show run
  # rate instead of pacing-vs-plan.
  budget: null
  # budget:
  #   total: 100000            # planned spend for the flight
  #   flight_weeks: 26         # flight length in weeks
  # Optional goal thresholds for the tier scorecard's bullet gauges (Exec Summary).
  # Per metric key (see config/metrics.yaml):
  #   goal        : target value — turns a volume metric into a pacing bar (else totals grid)
  #   good / warn : RAG thresholds for efficiency/quality metrics. Direction follows the
  #                 metric's higher_is_better: for costs (lower=better) good <= warn; for
  #                 rates (higher=better) good >= warn.
  # Any metric with no entry falls back to bands derived from the channel spread (labeled
  # as such) — no faked absolute target. Mirrors the Power BI "Goals" table.
  targets: {}
  # targets:
  #   impressions: {goal: 700000000}
  #   clicks:      {goal: 800000}
  #   key_events:  {goal: 2000000}
  #   cpm: {good: 2.0, warn: 4.0}
  #   cpc: {good: 1.0, warn: 2.0}
  #   ctr: {good: 0.012, warn: 0.006}
  #   cost_per_key_event: {good: 0.25, warn: 0.75}
  #   roas: {good: 3.0, warn: 1.5}
  # DEFERRED "External context" aside on the Overview: curated per-client notes
  # only (one bullet per line), never generated content. Hidden until enabled.
  macro_context:
    enabled: false
    notes_file: config/macro_notes.md
