# Copy to config/config.yaml (gitignored) and adjust to your data.
project:
  name: Advanced Reporting
  currency: USD

data:
  # optional: restrict the pipeline to specific extraction sources (see the `source`
  # column stamped by the store), e.g. [google_ads, meta_ads, linkedin_ads, ga4].
  # null = use everything in the store. CLI --sources overrides.
  sources: null
  source: synthetic          # active ad source: synthetic | csv | supermetrics |
                             #   google_ads | meta | tiktok | linkedin (see ingestion/factory.py)
  geos:                      # synthetic-only: a handful of geos to emit
    - US-NE
    - US-MW
    - US-W
  start: "2024-07-01"        # fixed extraction window (ISO) for deterministic, reproducible
  end: "2026-06-28"          #   pulls; override per-run with `ingest.py --start/--end`
  raw_dir: data/raw
  processed_dir: data/processed
  sample_file: data/raw/sample_campaigns.csv
  # optional: business-KPI weekly CSV (CRM matchback) — defaults to
  # data/raw/business_kpi_weekly.csv when unset
  # kpi_path: "data/MMM Data/business_kpi_weekly.csv"
  # optional: post-conversion pipeline stage counts (ATS/CRM export: week x geo x
  # initiative x stage + last-touch channel). Reporting layer ONLY (the
  # recruiting_pipeline block + outcome-tier volume metrics) — stages lag media by
  # months and are never a modeling target or input.
  # pipeline_stages_path: "data/MMM Data/crm_pipeline_stages.csv"

modeling:
  engine: baseline            # "baseline" (always available) or "meridian"
  target: revenue             # KPI to decompose
  date_col: date
  channel_spend_cols:         # media channels (spend) to model
    - google_search
    - google_pmax
    - meta
    - tiktok
    - linkedin
  control_cols:               # non-media drivers
    - price_index
    - promo_flag
  adstock_max_lag: 8
  train_frac: 0.85
  # Google Meridian sampler (only used when engine: meridian). Geo-level Bayesian MCMC —
  # minutes on CPU, manual/local only (CI never fits Meridian). knots < n_weeks keeps the
  # geo model identifiable; holdout_frac is a random-CELL held-out set for honest R².
  meridian:
    n_chains: 4
    n_adapt: 500
    n_burnin: 500
    n_keep: 1000
    knots: 20
    holdout_frac: 0.15
  # Meridian is geo-level: it also needs per-geo population weights (data.geo_populations).

quality:
  spike_factor: 3.0           # flag a week if channel x geo spend > N x the prior week
  fill_freq: W-MON            # calendar grain for gap-filling missing weeks

agent:
  # The report-spec agent (scripts/advise.py --spec). Runs at PIPELINE TIME only —
  # sends system/ knowledge + compact computed summaries (never raw rows) to the
  # model API. Set enabled: false for engagements whose confidentiality terms
  # forbid third-party processing (see system/context/client_brief.template.md).
  enabled: true
  model: claude-sonnet-5

reporting:
  output_dir: outputs
  # REPORT FRAMING (kpi_label, funnel, targets, client/campaign naming, budget) is
  # confirmed on the dashboard's **Setup** page and stored in config/engagement.yaml
  # (gitignored, survives data refreshes) — the intake flow proposes from the loaded
  # data, you confirm, and every surface reads the result. Framing keys set HERE
  # still override engagement.yaml (escape hatch, "explicit config wins") — but the
  # framing guard validates every layer against the loaded data, and a report will
  # not build while framing is unconfirmed or contradicted (see
  # docs/design-intake-agent.md). intake_mode: strict makes engagement.yaml the
  # ONLY confirmation path (default lenient: guard-passing config keys confirm too).
  # intake_mode: lenient
  # report_audience: client        # client (default) | internal — the HTML report is
  #                                # CLIENT-SAFE by default; internal keeps analyst
  #                                # watch flags + review framing.
  # Show the AI-drafted commentary section (outputs/commentary_ai.md, written by
  # scripts/advise.py --commentary) on the Overview. OFF by default: the
  # deterministic narrative blocks remain the spine; the AI section is clearly
  # stamped and number-guarded, but a human reviews it before a client sees it.
  ai_commentary: false
  # DEFERRED "External context" aside on the Overview: curated per-client notes
  # only (one bullet per line), never generated content. Hidden until enabled.
  macro_context:
    enabled: false
    notes_file: config/macro_notes.md
